<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Penguin Therapy - Un gioco di animale virtuale interattivo con un pinguino carino">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="🐧 Penguin Therapy">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232c3e50' width='192' height='192'/><text x='96' y='140' font-size='120' text-anchor='middle'>🐧</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232c3e50' width='192' height='192' rx='40'/><text x='96' y='140' font-size='120' text-anchor='middle'>🐧</text></svg>">
    
    <title>Penguin Therapy Pet - Gioco Interattivo</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="device">
        <h1 id="title">🐧 Penguin Therapy</h1>
        
        <div id="screen-bezel">
            <div id="screen">
                <div id="sun-moon"></div>
                <div id="snowflakes"></div>
                
                <div id="house">
                    <div class="roof-tier-1"></div>
                    <div class="roof-tier-2"></div>
                    <div class="house-body">
                        <div id="house-sign">
                            <div id="house-sign-text">Dottoressa Chiara,<br>la psicologa dei pinguini</div>
                        </div>
                        <div class="window left"></div>
                        <div class="window right"></div>
                        <div class="door"><div class="doorknob"></div></div>
                    </div>
                </div>

                <div id="ground"></div>
                
                <div id="pet-container" class="bounce">
                    <canvas id="pet-canvas" width="14" height="10"></canvas>
                </div>
            </div>
        </div>

        <div id="ui-panel">
            <div id="status-box">Ciao! Sono il tuo nuovo animaletto domestico.</div>
            
            <div id="stats-grid">
                <div class="stat-row">
                    <span class="stat-label">🍖 Fame</span>
                    <div class="stat-bar"><div id="fill-hunger" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">😊 Felicità</span>
                    <div class="stat-bar"><div id="fill-happiness" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">⚡ Energia</span>
                    <div class="stat-bar"><div id="fill-energy" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">✨ Pulizia</span>
                    <div class="stat-bar"><div id="fill-clean" class="stat-fill"></div></div>
                </div>
            </div>

            <div id="actions">
                <button onclick="gameEngine.doAction('feed')" id="btn-feed" class="btn-action">
                    <span class="btn-icon">🐟</span>
                    <span>Nutrire</span>
                </button>
                <button onclick="gameEngine.doAction('play')" id="btn-play" class="btn-action">
                    <span class="btn-icon">🎾</span>
                    <span>Giocare</span>
                </button>
                <button onclick="gameEngine.doAction('sleep')" id="btn-sleep" class="btn-action">
                    <span class="btn-icon">🌙</span>
                    <span>Dormire</span>
                </button>
                <button onclick="gameEngine.doAction('clean')" id="btn-clean" class="btn-action">
                    <span class="btn-icon">🛁</span>
                    <span>Pulire</span>
                </button>
            </div>

            <div id="settings-panel">
                <button onclick="gameEngine.toggleSettings()" id="btn-settings" class="btn-settings">⚙️ Impostazioni</button>
                <div id="settings-menu" class="hidden">
                    <label>
                        <input type="checkbox" id="sound-toggle" checked> 🔊 Suoni
                    </label>
                    <label>
                        <input type="checkbox" id="particles-toggle" checked> ✨ Effetti
                    </label>
                    <button onclick="gameEngine.resetGame()" class="btn-reset">🔄 Ricomincia</button>
                    <button onclick="gameEngine.toggleSettings()" class="btn-close">✕ Chiudi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/pixel-renderer.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('🐧 Service Worker registrato:', registration);
                })
                .catch(error => {
                    console.log('Errore Service Worker:', error);
                });
        }

        // Handle PWA install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('🐧 App installabile rilevata');
        });

        // Listen for app install
        window.addEventListener('appinstalled', () => {
            console.log('🐧 App installata con successo!');
        });
    </script>
</body>
</html>
