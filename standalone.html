<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Penguin Therapy - Gioco Tamagotchi con pinguino">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Penguin Therapy">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="email=no">
    
    <title>🐧 Penguin Therapy</title>
    
    <style>
        :root {
            --bg-color: #2c3e50;
            --device-bg: #e0e6ed;
            --screen-bg: #a1d6e2;
            --text-dark: #2d3436;
            --wood-light: #d4a373;
            --wood-dark: #8b5a33;
            --wood-edge: #5c3a21;
            --snow: #f8f9fa;
            --accent: #ff9f43;
            --outline: #1e272e;
            --ui-panel: #ced6e0;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
        }

        #device {
            background-color: var(--device-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 15px;
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.1), inset 4px 4px 10px rgba(255,255,255,0.8), 8px 12px 20px rgba(0,0,0,0.4);
            border: 2px solid var(--outline);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #title {
            text-align: center;
            font-weight: 900;
            font-size: 16px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
            margin: 0;
        }

        #screen-bezel {
            background-color: #4b6584;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--outline);
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.5);
        }

        #screen {
            background-color: var(--screen-bg);
            width: 100%;
            height: 240px;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--outline);
            image-rendering: pixelated;
            transition: filter 1s ease;
        }

        #screen.night {
            filter: brightness(0.4) contrast(1.2);
        }

        #sun-moon {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 20px;
            height: 20px;
            background: #fff9c4;
            border: 2px solid var(--outline);
            box-shadow: 0 0 0 2px rgba(255, 249, 196, 0.4);
            border-radius: 50%;
        }

        #snowflakes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .flake {
            position: absolute;
            background: white;
            width: 3px;
            height: 3px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(260px); }
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background-color: var(--snow);
            border-top: 2px solid var(--outline);
        }

        #house {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .roof-tier-1 { 
            width: 140px; 
            height: 16px; 
            background: #e8e8e8;
            border: 2px solid var(--outline); 
            border-bottom: none;
            position: relative;
            clip-path: polygon(10% 100%, 0% 0%, 100% 0%, 90% 100%);
        }
        
        .roof-tier-2 { 
            width: 170px; 
            height: 16px; 
            background: #d4d4d4;
            border: 2px solid var(--outline); 
            border-bottom: none;
            position: relative;
            clip-path: polygon(8% 100%, 0% 0%, 100% 0%, 92% 100%);
        }
        
        .roof-tier-3 {
            width: 200px;
            height: 18px;
            background: #c0c0c0;
            border: 2px solid var(--outline);
            border-bottom: none;
            position: relative;
            clip-path: polygon(5% 100%, 0% 0%, 100% 0%, 95% 100%);
        }

        .roof-decoration {
            position: absolute;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, transparent, transparent 8px, #a0a0a0 8px, #a0a0a0 10px);
            top: 50%;
            transform: translateY(-50%);
        }

        .house-body {
            width: 160px;
            height: 110px;
            background: var(--wood-light);
            border: 2px solid var(--outline);
            position: relative;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 18px, rgba(0,0,0,0.1) 18px, rgba(0,0,0,0.1) 20px);
        }

        .door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 52px;
            background: var(--wood-dark);
            border: 2px solid var(--outline);
            border-bottom: none;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3);
        }

        .doorknob {
            position: absolute;
            right: 6px;
            top: 24px;
            width: 5px;
            height: 5px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 3px rgba(241, 196, 15, 0.8);
        }

        .window {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ffeb3b;
            border: 2px solid var(--outline);
            box-shadow: 0 0 8px rgba(255, 235, 59, 0.8), inset 0 0 4px rgba(255, 255, 255, 0.4);
        }
        .window.left { 
            left: 12px;
            top: 25px;
        }
        .window.right { 
            right: 12px;
            top: 25px;
        }

        .window::after { content: ''; position: absolute; top: 14px; left: 0; width: 100%; height: 2px; background: var(--outline); }
        .window::before { content: ''; position: absolute; top: 0; left: 14px; width: 2px; height: 100%; background: var(--outline); }

        .window-pane {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255, 235, 59, 0.3);
        }

        .window-pane.tl { top: 1px; left: 1px; }
        .window-pane.tr { top: 1px; right: 1px; }
        .window-pane.bl { bottom: 1px; left: 1px; }
        .window-pane.br { bottom: 1px; right: 1px; }

        #house-sign {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 155px;
            background: var(--wood-dark);
            border: 2px solid var(--wood-edge);
            padding: 5px 3px;
            text-align: center;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.4), inset 1px 1px 0 rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        #house-sign-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 6px;
            line-height: 1.2;
            color: #fef5e7;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
            margin: 0;
            letter-spacing: 0px;
            word-break: break-word;
        }

        .chimney {
            position: absolute;
            right: 20px;
            top: -20px;
            width: 12px;
            height: 28px;
            background: #8b5a33;
            border: 2px solid var(--outline);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3);
        }

        .chimney-smoke {
            position: absolute;
            right: 1px;
            top: -8px;
            width: 8px;
            height: 8px;
            background: #d0d0d0;
            border-radius: 50%;
            opacity: 0.6;
            animation: smoke 2s infinite;
        }

        @keyframes smoke {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-4px); }
        }

        #pet-container {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 65px;
            z-index: 10;
        }

        #pet-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .bounce {
            animation: petBounce 0.4s ease infinite alternate;
        }

        .jump {
            animation: petJump 0.5s ease;
        }

        @keyframes petBounce {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-3px); }
        }

        @keyframes petJump {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-18px); }
        }

        .particle {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            z-index: 20;
            animation: floatUp 1s forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-35px) scale(1.5); }
        }

        #ui-panel {
            background: var(--ui-panel);
            border: 2px solid var(--outline);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #status-box {
            background: #000;
            color: #fff;
            padding: 6px;
            font-size: 11px;
            border: 2px solid var(--outline);
            text-align: center;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            animation: statusPulse 0.5s ease;
        }

        @keyframes statusPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }

        .stat-row {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .stat-label {
            font-size: 8px;
            font-weight: bold;
            color: var(--text-dark);
            text-transform: uppercase;
        }

        .stat-bar {
            width: 100%;
            height: 8px;
            background: #fff;
            border: 2px solid var(--outline);
            position: relative;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            background: var(--success);
            width: 100%;
            transition: width 0.3s, background-color 0.3s;
        }

        .stat-fill.warning { background: var(--warning); }
        .stat-fill.danger { background: var(--danger); }

        #actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        button {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            font-weight: 900;
            padding: 8px 3px;
            border: 2px solid var(--outline);
            background: #fff;
            color: var(--text-dark);
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 1px 1px 0 var(--outline);
            border-radius: 4px;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        button:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0 var(--outline);
            background: #f1f2f6;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-icon { 
            font-size: 13px;
            margin-bottom: 1px;
        }

        #settings-panel {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-settings {
            font-size: 10px;
            padding: 6px;
        }

        #settings-menu {
            background: #fff;
            border: 2px solid var(--outline);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #settings-menu.hidden {
            display: none;
        }

        #settings-menu label {
            display: flex;
            align-items: center;
            font-size: 10px;
            gap: 6px;
            cursor: pointer;
        }

        #settings-menu input[type="checkbox"] {
            cursor: pointer;
            width: 14px;
            height: 14px;
        }

        .btn-reset, .btn-close {
            font-size: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div id="device">
        <h1 id="title">🐧 Penguin Therapy</h1>
        
        <div id="screen-bezel">
            <div id="screen">
                <div id="sun-moon"></div>
                <div id="snowflakes"></div>
                
                <div id="house">
                    <div id="house-sign">
                        <div id="house-sign-text">Dottoressa Chiara<br>la psicologa<br>dei pinguini</div>
                    </div>
                    <div class="roof-tier-1"><div class="roof-decoration"></div></div>
                    <div class="roof-tier-2"><div class="roof-decoration"></div></div>
                    <div class="roof-tier-3"><div class="roof-decoration"></div></div>
                    <div class="chimney">
                        <div class="chimney-smoke"></div>
                    </div>
                    <div class="house-body">
                        <div class="window left">
                            <div class="window-pane tl"></div>
                            <div class="window-pane tr"></div>
                            <div class="window-pane bl"></div>
                            <div class="window-pane br"></div>
                        </div>
                        <div class="window right">
                            <div class="window-pane tl"></div>
                            <div class="window-pane tr"></div>
                            <div class="window-pane bl"></div>
                            <div class="window-pane br"></div>
                        </div>
                        <div class="door"><div class="doorknob"></div></div>
                    </div>
                </div>

                <div id="ground"></div>
                
                <div id="pet-container" class="bounce">
                    <canvas id="pet-canvas" width="18" height="13"></canvas>
                </div>
            </div>
        </div>

        <div id="ui-panel">
            <div id="status-box">Ciao! Sono il tuo pinguino!</div>
            
            <div id="stats-grid">
                <div class="stat-row">
                    <span class="stat-label">Fame</span>
                    <div class="stat-bar"><div id="fill-hunger" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Felicità</span>
                    <div class="stat-bar"><div id="fill-happiness" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Energia</span>
                    <div class="stat-bar"><div id="fill-energy" class="stat-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Pulizia</span>
                    <div class="stat-bar"><div id="fill-clean" class="stat-fill"></div></div>
                </div>
            </div>

            <div id="actions">
                <button ontouchstart="" onclick="gameEngine.doAction('feed')" id="btn-feed">
                    <span class="btn-icon">🐟</span>Nutrire
                </button>
                <button ontouchstart="" onclick="gameEngine.doAction('play')" id="btn-play">
                    <span class="btn-icon">🎾</span>Giocare
                </button>
                <button ontouchstart="" onclick="gameEngine.doAction('sleep')" id="btn-sleep">
                    <span class="btn-icon">🌙</span>Dormire
                </button>
                <button ontouchstart="" onclick="gameEngine.doAction('clean')" id="btn-clean">
                    <span class="btn-icon">🛁</span>Pulire
                </button>
            </div>

            <div id="settings-panel">
                <button ontouchstart="" onclick="gameEngine.toggleSettings()" class="btn-settings">⚙️ Impostazioni</button>
                <div id="settings-menu" class="hidden">
                    <label><input type="checkbox" id="sound-toggle" checked> 🔊 Suoni</label>
                    <label><input type="checkbox" id="particles-toggle" checked> ✨ Effetti</label>
                    <button ontouchstart="" onclick="gameEngine.resetGame()" class="btn-reset">🔄 Ricomincia</button>
                    <button ontouchstart="" onclick="gameEngine.toggleSettings()" class="btn-close">✕ Chiudi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAME_CONFIG = {
            INITIAL_STATS: { hunger: 80, happiness: 80, energy: 80, clean: 80 },
            DECAY_RATES: { hunger: 1.5, happiness: 1, energy: 0.5, clean: 0.5 },
            ACTIONS: {
                feed: { hunger: 30, energy: 5, clean: -5 },
                play: { happiness: 30, energy: -15, clean: -15, hunger: -10 },
                clean: { clean: 100, happiness: 10, energy: -5 },
                sleep: { energy: 20 }
            },
            MOOD_THRESHOLDS: { sad: { hunger: 25, happiness: 25 }, sleepy: 25, happy: { happiness: 75, hunger: 50 } },
            CRITICAL_THRESHOLDS: { low: 50, warning: 25 },
            GAME_LOOP_INTERVAL: 2000,
            SLEEP_TICK_DURATION: 1000,
            MAX_SLEEP_TICKS: 5
        };

        const PIXEL_PALETTE = { 'b': '#1e272e', 'w': '#ffffff', 'o': '#ff9f43', 'p': '#ff8a80', 't': '#0abde3', 'g': '#ff6b9d', ' ': null };

        const PENGUIN_SPRITES = {
            idle: [
                "      bbbb      ",
                "     bbwwbb     ",
                "    bbwwwwbb    ",
                "   bwwwwwwwwb   ",
                "   bwwwwwwwwb   ",
                "   bwwoowwowb   ",
                "   bwwwwwwwwb   ",
                "  bbwwwwwwwwbb  ",
                "  bbbbwwwwbbbb  ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   "
            ],
            happy: [
                "      bbbb      ",
                "     bbwwbb     ",
                "    bbwwwwbb    ",
                "   bwwwwwwwwb   ",
                "   bwowwowwwb   ",
                "   bwwoowwowb   ",
                "   bwwwgwwwwb   ",
                "  bbwwwwwwwwbb  ",
                "  bbbbwwwwbbbb  ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   "
            ],
            sad: [
                "      bbbb      ",
                "     bbwwbb     ",
                "    bbwwwwbb    ",
                "   bwwwwwwwwb   ",
                "   bwtwwtwwwb   ",
                "   bwwoowwowb   ",
                "   bwwwtwwwwb   ",
                "  bbwwwwwwwwbb  ",
                "  bbbbwwwwbbbb  ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   "
            ],
            sleepy: [
                "      bbbb      ",
                "     bbwwbb     ",
                "    bbwwwwbb    ",
                "   bwwwwwwwwb   ",
                "   bwwwwwwwwb   ",
                "   bwwoowwowb   ",
                "   bwwwwwwwwb   ",
                "  bbwwwwwwwwbb  ",
                "  bbbbwwwwbbbb  ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   ",
                "   bobb  bobb   ",
                "   bbbb  bbbb   "
            ]
        };

        const MESSAGES = {
            greeting: ["Ciao! Sono il tuo pinguino!", "Benvenuto! Sono felice!"],
            feed: ["Yum! Delizioso!", "Grazie! Avevo fame!", "Mmm, perfetto!"],
            play: ["Che divertimento!", "Mi piace!", "Adoro giocare!"],
            clean: ["Sono pulito!", "Che sollievo!", "Mi sento meglio!"],
            sleep_start: ["Nap time... Zzz...", "Dormiamo..."],
            sleep_end: ["Mi sento riposato!", "Che riposo!"],
            hungry: ["Ho fame...", "Mi serve cibo!"],
            dirty: ["Mi fai un bagno?", "Mi sento sporco!"],
            tired: ["Ho sonno...", "Sono stanco..."],
            sad: ["Mi sento solo...", "Mi manchi..."],
            unable_play: ["Sono stanco!", "Ho fame!"]
        };

        class PixelRenderer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.currentState = 'idle';
            }
            drawPenguin(state, stats) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const sprite = PENGUIN_SPRITES[state] || PENGUIN_SPRITES.idle;
                for (let y = 0; y < sprite.length; y++) {
                    for (let x = 0; x < sprite[y].length; x++) {
                        const char = sprite[y][x];
                        if (PIXEL_PALETTE[char]) {
                            this.ctx.fillStyle = PIXEL_PALETTE[char];
                            this.ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
                if (stats.clean < 40 && state !== 'sleepy') {
                    this.ctx.fillStyle = '#8b5a33';
                    this.ctx.globalAlpha = (40 - stats.clean) / 40;
                    this.ctx.fillRect(5, 8, 2, 1);
                    this.ctx.fillRect(9, 9, 2, 1);
                    this.ctx.fillRect(6, 10, 1, 1);
                    this.ctx.globalAlpha = 1;
                }
            }
            getMoodState(stats) {
                if (stats.hunger < 25 || stats.happiness < 25) return 'sad';
                else if (stats.energy < 25) return 'sleepy';
                else if (stats.happiness > 75 && stats.hunger > 50) return 'happy';
                return 'idle';
            }
        }

        class ParticleEngine {
            constructor(containerId) { this.container = document.getElementById(containerId); }
            spawnParticle(emoji) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = emoji;
                particle.style.left = (Math.random() * 60 + 15) + 'px';
                particle.style.bottom = '50px';
                this.container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
            spawnMultiple(emoji, count = 2) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => this.spawnParticle(emoji), i * 100);
                }
            }
        }

        class AnimationEngine {
            constructor(containerId) { this.container = document.getElementById(containerId); }
            animate(animClass, duration = 500) {
                this.container.classList.remove('bounce', 'jump');
                this.container.classList.add(animClass);
                setTimeout(() => {
                    this.container.classList.remove(animClass);
                    if (!gameEngine.isSleeping) this.container.classList.add('bounce');
                }, duration);
            }
            jump() { this.animate('jump', 500); }
            stopBounce() { this.container.classList.remove('bounce'); }
            startBounce() { this.container.classList.add('bounce'); }
        }

        class EnvironmentEngine {
            static createSnow() {
                const container = document.getElementById('snowflakes');
                container.innerHTML = '';
                for (let i = 0; i < 20; i++) {
                    const flake = document.createElement('div');
                    flake.className = 'flake';
                    flake.style.left = Math.random() * 100 + '%';
                    flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    flake.style.animationDelay = (Math.random() * 5) + 's';
                    flake.style.opacity = Math.random();
                    container.appendChild(flake);
                }
            }
            static setNightMode(isNight) {
                const screen = document.getElementById('screen');
                const sunMoon = document.getElementById('sun-moon');
                if (isNight) {
                    screen.classList.add('night');
                    sunMoon.style.background = '#e8e8e8';
                    sunMoon.style.opacity = '0.6';
                } else {
                    screen.classList.remove('night');
                    sunMoon.style.background = '#fff9c4';
                    sunMoon.style.opacity = '1';
                }
            }
        }

        class GameEngine {
            constructor() {
                this.stats = { ...GAME_CONFIG.INITIAL_STATS };
                this.isSleeping = false;
                this.currentState = 'idle';
                this.gameLoopInterval = null;
                this.soundEnabled = true;
                this.particlesEnabled = true;
                this.settingsOpen = false;
                this.renderer = new PixelRenderer('pet-canvas');
                this.particles = new ParticleEngine('pet-container');
                this.animation = new AnimationEngine('pet-container');
                this.init();
            }
            init() {
                this.loadSettings();
                this.loadStats();
                EnvironmentEngine.createSnow();
                this.renderer.drawPenguin(this.currentState, this.stats);
                this.updateUI();
                this.startGameLoop();
            }
            startGameLoop() {
                if (this.gameLoopInterval) clearInterval(this.gameLoopInterval);
                this.gameLoopInterval = setInterval(() => {
                    if (!this.isSleeping) {
                        for (let key in GAME_CONFIG.DECAY_RATES) this.stats[key] -= GAME_CONFIG.DECAY_RATES[key];
                        this.updateUI();
                        this.checkCriticalStats();
                        this.autoSave();
                    }
                }, GAME_CONFIG.GAME_LOOP_INTERVAL);
            }
            checkCriticalStats() {
                if (this.stats.hunger < 20) this.showMessage(this.getRandomMessage('hungry'));
                else if (this.stats.clean < 20) this.showMessage(this.getRandomMessage('dirty'));
                else if (this.stats.energy < 20) this.showMessage(this.getRandomMessage('tired'));
                else if (this.stats.happiness < 20) this.showMessage(this.getRandomMessage('sad'));
            }
            doAction(action) {
                if (this.isSleeping && action !== 'sleep') return;
                const effects = GAME_CONFIG.ACTIONS[action];
                if (!effects) return;

                switch (action) {
                    case 'feed':
                        this.applyEffects(effects);
                        this.showMessage(this.getRandomMessage('feed'));
                        if (this.particlesEnabled) this.particles.spawnParticle('🐟');
                        this.animation.jump();
                        break;
                    case 'play':
                        if (this.stats.energy < 20 || this.stats.hunger < 20) {
                            this.showMessage(this.getRandomMessage('unable_play'));
                            return;
                        }
                        this.applyEffects(effects);
                        this.showMessage(this.getRandomMessage('play'));
                        if (this.particlesEnabled) this.particles.spawnMultiple('❤️', 2);
                        this.animation.jump();
                        break;
                    case 'clean':
                        this.applyEffects(effects);
                        this.showMessage(this.getRandomMessage('clean'));
                        if (this.particlesEnabled) this.particles.spawnMultiple('🫧', 2);
                        this.animation.jump();
                        break;
                    case 'sleep':
                        this.startSleep();
                        break;
                }
                this.updateUI();
            }
            applyEffects(effects) {
                for (let stat in effects) {
                    if (stat in this.stats) this.stats[stat] += effects[stat];
                }
                this.clampStats();
            }
            startSleep() {
                if (this.isSleeping) return;
                this.isSleeping = true;
                this.showMessage(this.getRandomMessage('sleep_start'));
                EnvironmentEngine.setNightMode(true);
                this.animation.stopBounce();
                this.renderer.drawPenguin('sleepy', this.stats);
                this.setButtonsDisabled(['feed', 'play', 'clean'], true);
                let sleepTicks = 0;
                const sleepInterval = setInterval(() => {
                    if (this.particlesEnabled) this.particles.spawnParticle('💤');
                    this.stats.energy = Math.min(100, this.stats.energy + GAME_CONFIG.ACTIONS.sleep.energy);
                    this.updateUI();
                    sleepTicks++;
                    if (sleepTicks >= GAME_CONFIG.MAX_SLEEP_TICKS || this.stats.energy >= 100) {
                        clearInterval(sleepInterval);
                        this.endSleep();
                    }
                }, GAME_CONFIG.SLEEP_TICK_DURATION);
            }
            endSleep() {
                this.isSleeping = false;
                EnvironmentEngine.setNightMode(false);
                this.animation.startBounce();
                this.showMessage(this.getRandomMessage('sleep_end'));
                this.setButtonsDisabled(['feed', 'play', 'clean'], false);
                this.updateUI();
            }
            updateUI() {
                this.clampStats();
                this.updateStatBars();
                this.updatePenguinState();
            }
            updateStatBars() {
                const statIds = { hunger: 'fill-hunger', happiness: 'fill-happiness', energy: 'fill-energy', clean: 'fill-clean' };
                for (let stat in statIds) {
                    const element = document.getElementById(statIds[stat]);
                    const value = this.stats[stat];
                    element.style.width = value + '%';
                    element.className = 'stat-fill';
                    if (value < 25) element.classList.add('danger');
                    else if (value < 50) element.classList.add('warning');
                }
            }
            updatePenguinState() {
                if (!this.isSleeping) {
                    const newState = this.renderer.getMoodState(this.stats);
                    if (this.currentState !== newState || this.stats.clean < 40) {
                        this.currentState = newState;
                        this.renderer.drawPenguin(this.currentState, this.stats);
                    }
                }
            }
            showMessage(text) {
                document.getElementById('status-box').innerText = text;
            }
            getRandomMessage(category) {
                const messages = MESSAGES[category] || ['...'];
                return messages[Math.floor(Math.random() * messages.length)];
            }
            clampStats() {
                for (let stat in this.stats) {
                    this.stats[stat] = Math.max(0, Math.min(100, this.stats[stat]));
                }
            }
            setButtonsDisabled(buttons, disabled) {
                buttons.forEach(btn => {
                    const element = document.getElementById(`btn-${btn}`);
                    if (element) element.disabled = disabled;
                });
            }
            toggleSettings() {
                const menu = document.getElementById('settings-menu');
                this.settingsOpen = !this.settingsOpen;
                if (this.settingsOpen) {
                    menu.classList.remove('hidden');
                } else {
                    menu.classList.add('hidden');
                }
            }
            resetGame() {
                if (confirm('Ricominciare? Perderai tutti i progressi.')) {
                    this.stats = { ...GAME_CONFIG.INITIAL_STATS };
                    this.isSleeping = false;
                    this.currentState = 'idle';
                    this.setButtonsDisabled(['feed', 'play', 'clean'], false);
                    EnvironmentEngine.setNightMode(false);
                    this.animation.startBounce();
                    this.showMessage(this.getRandomMessage('greeting'));
                    this.updateUI();
                    this.saveStats();
                    this.toggleSettings();
                }
            }
            saveStats() {
                try {
                    localStorage.setItem('penguin_stats', JSON.stringify({ stats: this.stats, timestamp: Date.now() }));
                } catch (e) {}
            }
            loadStats() {
                try {
                    const saved = localStorage.getItem('penguin_stats');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.stats = { ...data.stats };
                    }
                } catch (e) {}
            }
            autoSave() {
                this.saveStats();
            }
            saveSettings() {
                try {
                    const settings = { soundEnabled: this.soundEnabled, particlesEnabled: this.particlesEnabled };
                    localStorage.setItem('penguin_settings', JSON.stringify(settings));
                } catch (e) {}
            }
            loadSettings() {
                try {
                    const saved = localStorage.getItem('penguin_settings');
                    if (saved) {
                        const settings = JSON.parse(saved);
                        this.soundEnabled = settings.soundEnabled !== false;
                        this.particlesEnabled = settings.particlesEnabled !== false;
                    }
                } catch (e) {}
            }
        }

        let gameEngine;
        document.addEventListener('DOMContentLoaded', () => {
            gameEngine = new GameEngine();
            const soundToggle = document.getElementById('sound-toggle');
            const particlesToggle = document.getElementById('particles-toggle');
            if (soundToggle) {
                soundToggle.addEventListener('change', (e) => {
                    gameEngine.soundEnabled = e.target.checked;
                    gameEngine.saveSettings();
                });
            }
            if (particlesToggle) {
                particlesToggle.addEventListener('change', (e) => {
                    gameEngine.particlesEnabled = e.target.checked;
                    gameEngine.saveSettings();
                });
            }
        });
        window.addEventListener('beforeunload', () => {
            if (gameEngine) {
                gameEngine.saveStats();
                gameEngine.saveSettings();
            }
        });
    </script>
</body>
</html>
